name: JetUIPaywallExample
options:
  bundleIdPrefix: com.jetui.examples
  deploymentTarget:
    iOS: "17.0"
packages:
  JetUI:
    path: ../..
targets:
  JetUIPaywallExample:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: JetUI
        product: JetUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jetui.examples.paywall
        PRODUCT_NAME: JetUIPaywallExample
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
schemes:
  JetUIPaywallExample:
    build:
      targets:
        JetUIPaywallExample: all
    run:
      config: Debug
    archive:
      config: Release
